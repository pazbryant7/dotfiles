# General settings
backend = "glx"; # xrender/glx/egl
glx-copy-from-front = false;
use-damage = true;
vsync = true;
detect-client-opacity = true;
detect-transient = true;
unredir-if-possible = true;
detect-client-leader = true;
detect-rounded-corners = true;

# Corners
corner-radius = 8
rounded-corners-exclude = [
    "class_g = 'Rofi'",
    "class_g = 'Dunst'",
    "class_g = 'Polybar'",
    "class_g = 'dwm'",
];


# Shadows
shadow = false;

# Dim inactive
focus-exclude = [
    "class_g = 'slop'",
];

opacity-rule = [
    "100:class_g    = 'Polybar'",
    "100:class_g    = 'dwm'",
    "100:class_g    = 'Brave-browser'",
    "100:class_g    = 'firefox'",
];


# blur
# blur-method = "dual_kawase";
# blur-strength = 4;
# blur-background-exclude = [
#     "class_g != 'Alacritty' && class_g != 'st' && class_g != 'st-256color'"
# ];

wintypes:
{
    dnd = { shadow = false; blur-background = false; }
    menu = { shadow = false; blur-background = false; }
    popup_menu = { opacity = 1.0; blur-background = false; }
    dropdown_menu = { opacity = 1.0; blur-background = false; }
    dock = { shadow = false; clip-shadow-above = false; blur-background = false; }
    utility = { opacity = 1.0; fade = true; shadow = false; focus = true; blur-background = false; }
    tooltip = { opacity = 1.0; fade = true; shadow = false; focus = true; full-shadow = false; blur-background = false; }
};
