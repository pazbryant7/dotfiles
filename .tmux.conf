# ~/.tmux.conf

# -----------------------------------------------------------------------------
# General Settings
# -----------------------------------------------------------------------------

# Set base index for windows and panes to 1
set-option -g base-index 1
set-window-option -g pane-base-index 1

# Set history limit
set-option -g history-limit 5000

# Reduce delay after prefix key
set-option -s escape-time 0

# Enable mouse mode
set-option -g mouse on

# Enable focus events (useful for Neovim)
set-option -g focus-events on

# Set terminal compatibility and enable true color
set-option -g default-terminal "screen-256color"

# -----------------------------------------------------------------------------
# Appearance & Status Bar
# -----------------------------------------------------------------------------

# Enable status bar and set position
set-option -g status on
set-option -g status-position bottom

# Enable titles
set-option -g set-titles on

# Status bar style
set-option -g status-style 'bg=#1e1e2e,fg=#505050'

# Status bar content alignment and lengths
set-option -g status-left-length 140
set-option -g status-right-length 60
set-option -g status-justify 'absolute-centre'

# Status bar left side: Session name
set-option -g status-left '#S#[fg=#616161]#{S:#{?session_attached,, #S}} '

# Status bar center: Window list format
set-option -g window-status-format '#[fg=#616161]'
set-option -g window-status-current-format ''

# Status bar right side: Current path
set-option -g status-right '#T'

# Pane border style
set-option -g pane-border-lines simple

# Time panes are displayed when using display-panes command (in ms)
set-option -g display-panes-time 5000

# -----------------------------------------------------------------------------
# Keybindings
# -----------------------------------------------------------------------------
# Note: Default tmux bindings might be overwritten below

# --- Navigation ---

# Vim-like pane navigation
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind-key \\ select-pane -l
bind-key ^ last-window

# Show panels
bind-key -n C-s display-panes

# --- Window & Pane Management ---

# Create new window in home path
bind-key C run-shell "~/bin/tmux/new-window"
bind-key c new-window -c "#{pane_current_path}"

# Split panes vertically in the current path
bind-key % split-window -h -p 40 -c "#{pane_current_path}"

# Split panes horizontally in the current path
bind-key '"' split-window -v -c "#{pane_current_path}" # Use -v for vertical consistency

# --- Copy Mode (Vi-like) ---

set-window-option -g mode-keys vi
bind-key v copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

# --- Custom Actions & Scripts ---

# Go to window
bind-key 0 run-shell "~/bin/tmux/gowin 0"
bind-key 1 run-shell "~/bin/tmux/gowin 1"
bind-key 2 run-shell "~/bin/tmux/gowin 2"
bind-key 3 run-shell "~/bin/tmux/gowin 3"
bind-key 4 run-shell "~/bin/tmux/gowin 4"
bind-key 5 run-shell "~/bin/tmux/gowin 5"
bind-key 6 run-shell "~/bin/tmux/gowin 6"
bind-key 7 run-shell "~/bin/tmux/gowin 7"
bind-key 8 run-shell "~/bin/tmux/gowin 8"
bind-key 9 run-shell "~/bin/tmux/gowin 9"

# Toggle status bar visibility
bind-key b set-option -g status

# Kill all sessions but current
bind-key a run-shell "~/bin/tmux/remove-all"

# Swap window to target
bind-key i run-shell "~/bin/tmux/swap-window"

# Close window/pane (using custom script)
bind-key x run-shell "~/bin/tmux/close-window"

# Last session (using custom scripts)
bind-key s run-shell "~/bin/tmux/last-session"

# Session switcher
bind-key e display-popup -E "~/bin/tmux/switch"

# Close all windows/panes (using custom script)
bind-key X run-shell "~/bin/tmux/close-all-windows"

# Search and create new session
bind-key u display-popup -E "~/bin/tmux/new-session"

# Kill all sessions but home
bind-key K run-shell "~/bin/tmux/remove-all /home/$USER"

# Open todo list
bind-key t run-shell "~/bin/tmux/new-session /home/bryant/Documents/github/notes"
bind-key y run-shell "~/bin/tmux/new-session /home/bryant/Documents/github/youtube"

# Switch/create sessions in specific directories (using custom scripts)
bind-key H run-shell "~/bin/tmux/new-session /home/bryant"
bind-key N run-shell "~/bin/tmux/new-session /home/bryant/.config/nvim"
bind-key G run-shell "~/bin/tmux/new-session /home/bryant/Documents/github/"
bind-key W run-shell "~/bin/tmux/new-session '#{pane_current_path}' working"
bind-key D run-shell "~/bin/tmux/new-session /home/bryant/Documents/github/dotfiles"
bind-key A run-shell "~/bin/tmux/new-session /home/bryant/Documents/github/ansible-dots/"

# Reload tmux configuration
bind-key R source-file ~/.tmux.conf \; display-message "Configuration Reloaded"
